<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ScrambleText</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>ScrambleText</h1>
      <p class="subtitle">Human-readable, machine-hostile</p>
    </div>
    <div class="preview-section">
      <label>Preview:</label>
      <textarea id="previewInput" placeholder="Type to preview..."></textarea>
      <div id="previewOutput"></div>
      <div class="copy-section">
        <button id="copyButton">Copy to Clipboard</button>
        <span id="copyStatus"></span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
